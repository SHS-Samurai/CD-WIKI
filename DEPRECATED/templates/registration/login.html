{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="panel narrow">
    <h1>Login</h1>
    <form method="post" class="form-stack">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>
            Benutzername
            {{ form.username }}
        </label>
        <label>
            Passwort
            {{ form.password }}
        </label>
        <button type="submit">Einloggen</button>
    </form>
    <p><a href="{% url 'register' %}">Registrieren</a></p>
</section>
{% endblock %}
