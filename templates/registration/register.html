{% extends "base.html" %}

{% block title %}Registrierung{% endblock %}

{% block content %}
<section class="panel narrow">
    <h1>Registrierung</h1>
    <form method="post" class="form-stack">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {{ form.website }}
        {{ form.started_at }}
        <label>
            Benutzername
            {{ form.username }}
            {{ form.username.errors }}
        </label>
        <label>
            E-Mail
            {{ form.email }}
            {{ form.email.errors }}
        </label>
        <label>
            Passwort
            {{ form.password1 }}
            {{ form.password1.errors }}
        </label>
        <label>
            Passwort wiederholen
            {{ form.password2 }}
            {{ form.password2.errors }}
        </label>
        <button type="submit">Registrieren</button>
    </form>
</section>
{% endblock %}
